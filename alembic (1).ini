[alembic]
# Path to migration scripts
script_location = migrations

# Template for migration file names: {year}{month}{day}_{rev}_{slug}.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Max length of slug in generated filenames
truncate_slug_length = 40

# sys.path addition for env.py imports
prepend_sys_path = .

# Database URL — overridden at runtime by env.py reading DATABASE_URL env var.
# This fallback is for running Alembic locally without Docker.
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/itemsdb

# Enable SQLAlchemy connection pool "pre-ping" to handle dropped connections
sqlalchemy.pool_pre_ping = true


# ── Logging ────────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
# Set to INFO to log all SQL statements, DEBUG for query params too
# level = INFO

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
