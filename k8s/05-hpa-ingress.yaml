---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: items-api-hpa
  namespace: items-microservice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: items-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: items-api-ingress
  namespace: items-microservice
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: items-api.example.com   # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: items-api
                port:
                  number: 80
  # Uncomment to enable TLS:
  # tls:
  #   - hosts:
  #       - items-api.example.com
  #     secretName: items-api-tls
