apiVersion: v1
kind: ConfigMap
metadata:
  name: items-api-config
  namespace: items-microservice
  labels:
    app: items-api
    component: config
data:
  # Server
  PORT: "8000"
  HOST: "0.0.0.0"
  WORKERS: "2"

  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # App
  APP_ENV: "production"
  APP_NAME: "items-microservice"
  APP_VERSION: "1.0.0"

  # Database (non-sensitive — credentials live in the Secret)
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "itemsdb"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"

  # CORS
  CORS_ORIGINS: "*"

  # Pagination defaults
  DEFAULT_PAGE_LIMIT: "100"
  MAX_PAGE_LIMIT: "500"
