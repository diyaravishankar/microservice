---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: items-api
  namespace: items-microservice
  labels:
    app: items-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: items-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: items-api
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: items-api
          image: items-microservice:latest   # Replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/itemsdb"
          envFrom:
            - configMapRef:
                name: items-api-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: items-api

---
apiVersion: v1
kind: Service
metadata:
  name: items-api
  namespace: items-microservice
  labels:
    app: items-api
spec:
  selector:
    app: items-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
