# ══════════════════════════════════════════════════════════════════════════════
# IMPORTANT — READ BEFORE COMMITTING
# ══════════════════════════════════════════════════════════════════════════════
# This file contains base64-encoded placeholder credentials FOR LOCAL/DEV USE.
# base64 is NOT encryption — anyone can decode these values trivially.
#
# Before deploying to staging or production:
#   1. Replace values with real secrets (see "Generating values" below).
#   2. Never commit real credentials to source control.
#   3. Use one of the production secret strategies listed at the bottom.
#
# Generating base64 values:
#   echo -n "your-actual-password" | base64
#
# Decoding to verify:
#   echo "base64string" | base64 --decode
# ══════════════════════════════════════════════════════════════════════════════

---
# ── PostgreSQL Credentials ────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: items-microservice
  labels:
    app: items-api
    component: database
  annotations:
    # Remind operators this secret must be rotated
    secret/managed-by: "manual"
    secret/rotate-after: "90d"
type: Opaque
data:
  # "postgres" — replace with a least-privilege DB username
  POSTGRES_USER: cG9zdGdyZXM=

  # "supersecret" — replace with a strong random password (32+ chars recommended)
  # Generate one: openssl rand -base64 32
  POSTGRES_PASSWORD: c3VwZXJzZWNyZXQ=

  # "itemsdb"
  POSTGRES_DB: aXRlbXNkYg==

---
# ── Application Secrets ───────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: items-api-secret
  namespace: items-microservice
  labels:
    app: items-api
    component: api
  annotations:
    secret/managed-by: "manual"
    secret/rotate-after: "90d"
type: Opaque
data:
  # Full DATABASE_URL — built from the postgres-secret values above.
  # "postgresql://postgres:supersecret@postgres:5432/itemsdb"
  # Keeping it here as a single key simplifies the Deployment env injection.
  DATABASE_URL: cG9zdGdyZXNxbDovL3Bvc3RncmVzOnN1cGVyc2VjcmV0QHBvc3RncmVzOjU0MzIvaXRlbXNkYg==

  # Secret key used for signing tokens / sessions if you add auth later.
  # Generate: openssl rand -hex 32
  # Placeholder value: "changeme-replace-with-32-char-random-secret"
  SECRET_KEY: Y2hhbmdlbWUtcmVwbGFjZS13aXRoLTMyLWNoYXItcmFuZG9tLXNlY3JldA==

# ══════════════════════════════════════════════════════════════════════════════
# PRODUCTION SECRET MANAGEMENT OPTIONS
# ══════════════════════════════════════════════════════════════════════════════
#
# Option A — Sealed Secrets (GitOps-friendly, works offline)
#   Encrypts secrets with a cluster-side key so the encrypted file is safe
#   to commit. https://github.com/bitnami-labs/sealed-secrets
#
#   kubeseal --format yaml < 01-secrets.yaml > 01-sealed-secrets.yaml
#
# Option B — External Secrets Operator (recommended for cloud workloads)
#   Syncs secrets from AWS Secrets Manager / GCP Secret Manager / Vault
#   into native Kubernetes Secrets automatically.
#   https://external-secrets.io
#
#   Example ExternalSecret resource (AWS):
#
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret
#   metadata:
#     name: postgres-secret
#     namespace: items-microservice
#   spec:
#     refreshInterval: 1h
#     secretStoreRef:
#       name: aws-secretsmanager
#       kind: ClusterSecretStore
#     target:
#       name: postgres-secret
#     data:
#       - secretKey: POSTGRES_PASSWORD
#         remoteRef:
#           key: prod/items-microservice/postgres
#           property: password
#
# Option C — HashiCorp Vault + Vault Agent Injector
#   Injects secrets directly into pod filesystems at runtime.
#   https://developer.hashicorp.com/vault/docs/platform/k8s/injector
#
# ══════════════════════════════════════════════════════════════════════════════
