---
# Allow ingress to API from anywhere within the cluster
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: items-microservice
spec:
  podSelector:
    matchLabels:
      app: items-api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8000

---
# Allow API pods to reach Postgres; deny all other ingress to Postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: items-microservice
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: items-api
      ports:
        - port: 5432
